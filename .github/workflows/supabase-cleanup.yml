name: Supabase cleanup rollout

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - supabase/cleanup_stoecklilager_rollout.sql
      - .github/workflows/supabase-cleanup.yml

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN repository secret."
            exit 1
          fi
          if [ -n "$SUPABASE_DB_PASSWORD" ]; then
            supabase link --project-ref iiakqkdcdqhhhrkwagtb --password "$SUPABASE_DB_PASSWORD"
          else
            supabase link --project-ref iiakqkdcdqhhhrkwagtb
          fi

      - name: Run Stöcklilager cleanup SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db query --linked --file supabase/cleanup_stoecklilager_rollout.sql

      - name: Verify cleanup result
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked --output table "
            select
              (select count(*) from anmeldungen_tn at
                 join lager l on l.id = at.lager_id
                 join organisation o on o.id = l.organisation_id
                 where lower(o.slug) = 'stoeckli' or lower(o.name) like '%stöcklilager%' or lower(o.name) like '%stoecklilager%'
              ) as tn_count,
              (select count(*) from anmeldungen_leiter al
                 join lager l on l.id = al.lager_id
                 join organisation o on o.id = l.organisation_id
                 where lower(o.slug) = 'stoeckli' or lower(o.name) like '%stöcklilager%' or lower(o.name) like '%stoecklilager%'
              ) as leiter_count,
              (select count(*) from organisation_mitglieder om
                 join organisation o on o.id = om.organisation_id
                 where lower(o.slug) = 'stoeckli' or lower(o.name) like '%stöcklilager%' or lower(o.name) like '%stoecklilager%'
              ) as org_mitglieder_count
          "
