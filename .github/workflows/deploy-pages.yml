name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & build
        working-directory: app
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Copy CNAME
        run: cp CNAME app/dist/CNAME && touch app/dist/.nojekyll

      # Pages-Quelle auf gh-pages umstellen (deploy-pages API hängt sonst ewig in Queue)
      - name: Pages-Quelle auf gh-pages setzen
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pages" -X PUT \
            -f build_type=legacy \
            -f 'source[branch]=gh-pages' \
            -f 'source[path]=/'

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./app/dist
          publish_branch: gh-pages
          cname: app.stoecklilager.com
