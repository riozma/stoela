name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

# Nie abbrechen – sonst hängen Deployments in der Pages-Queue.
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build
        working-directory: app
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Copy CNAME
        run: cp CNAME app/dist/CNAME

      # Direkter Git-Push auf gh-pages – umgeht die langsame Pages-Deployment-Queue
      # (deploy-pages blieb 10+ Min. in deployment_queued hängen).
      # Einmalig in GitHub: Settings → Pages → Source: Branch gh-pages / root
      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: app/dist
          branch: gh-pages
          clean: true
          single-commit: true
